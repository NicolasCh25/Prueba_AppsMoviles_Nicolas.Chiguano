<ion-header>
  <ion-toolbar>
    <ion-title>
      Películas
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-searchbar
    placeholder="Buscar película"
    (ionInput)="searchMovie($event)">
  </ion-searchbar>

  <ion-list>

    <ion-item
      *ngFor="let movie of movies"
      (click)="viewMovie(movie.id)">

      <ion-card style="width:100%;">

        <img
          [src]="imageUrl + movie.poster_path"
        />

        <ion-card-header>

          <ion-card-title>
            {{movie.title}}
          </ion-card-title>

        </ion-card-header>

        <ion-card-content>

          ⭐ {{movie.vote_average}}

          <br>

          {{movie.release_date}}

        </ion-card-content>

      </ion-card>

    </ion-item>

  </ion-list>

</ion-content>
