<ion-header>
  <ion-toolbar>
    <ion-title>
      Perfil
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card *ngIf="user">

    <ion-card-content>

      <ion-avatar
        style="margin:auto; width:120px; height:120px;">

        <img
          src="https://ionicframework.com/docs/img/demos/avatar.svg">

      </ion-avatar>

      <h2 style="text-align:center; margin-top:20px;">
        Usuario
      </h2>

      <p>
        <strong>Email:</strong>
        {{user.email}}
      </p>

      <p>
        <strong>UID:</strong>
        {{user.uid}}
      </p>

      <ion-button
        expand="block"
        color="danger"
        (click)="logout()">

        Cerrar sesión

      </ion-button>

    </ion-card-content>

  </ion-card>

</ion-content>
