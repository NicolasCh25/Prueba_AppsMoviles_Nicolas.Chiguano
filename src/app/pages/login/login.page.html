<ion-header>
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-input
      label="Correo"
      type="email"
      [(ngModel)]="email">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-input
      label="Password"
      type="password"
      [(ngModel)]="password">
    </ion-input>
  </ion-item>

  <ion-button
    expand="block"
    (click)="login()">

    Ingresar

  </ion-button>

  <ion-button
    expand="block"
    fill="outline"
    routerLink="/register">

    Crear cuenta

  </ion-button>

</ion-content>
